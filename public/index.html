<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 潛在客戶深度分析系統</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; }
    
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 1rem 2rem; }
    .header h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
    .header .badge { background: #ffa502; color: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
    
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    
    /* 搜尋框 */
    .search-box { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .search-box h2 { margin-bottom: 15px; color: #333; }
    .search-box p { color: #666; font-size: 0.9rem; margin-bottom: 15px; }
    .search-form { display: flex; gap: 10px; }
    .search-form input { flex: 1; padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .search-form input:focus { border-color: #667eea; outline: none; }
    .search-form button { padding: 14px 30px; background: #1a1a2e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .search-form button:disabled { background: #ccc; }
    
    /* 分析結果卡片 */
    .result-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; }
    .result-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .result-header h3 { font-size: 1.3rem; }
    .result-score { background: white; color: #667eea; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 1.2rem; }
    
    .result-body { padding: 20px; }
    
    /* 基本資料 */
    .info-section { margin-bottom: 20px; }
    .info-section h4 { color: #333; margin-bottom: 10px; font-size: 1rem; border-bottom: 2px solid #667eea; padding-bottom: 5px; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .info-item { background: #f8f9fa; padding: 10px; border-radius: 6px; }
    .info-label { color: #666; font-size: 0.75rem; text-transform: uppercase; }
    .info-value { color: #333; font-weight: 500; margin-top: 3px; }
    .info-value.empty { color: #ccc; font-style: italic; }
    
    /* 聯繫方式 */
    .contact-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .contact-tag { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
    .contact-tag.line { background: #06C755; color: white; }
    .contact-tag.phone { background: #4285f4; color: white; }
    .contact-tag.email { background: #ea4335; color: white; }
    .contact-tag.fb { background: #1877f2; color: white; }
    .contact-tag.other { background: #9c27b0; color: white; }
    .contact-tag.none { background: #f5f5f5; color: #999; }
    
    /* 評估分析 */
    .analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
    @media (max-width: 600px) { .analysis-grid { grid-template-columns: 1fr; } }
    .analysis-box { padding: 15px; border-radius: 8px; }
    .analysis-box.strengths { background: #e8f5e9; border-left: 4px solid #4caf50; }
    .analysis-box.weaknesses { background: #ffebee; border-left: 4px solid #f44336; }
    .analysis-box.opportunities { background: #e3f2fd; border-left: 4px solid #2196f3; }
    .analysis-box.threats { background: #fff3e0; border-left: 4px solid #ff9800; }
    .analysis-box h5 { font-size: 0.85rem; margin-bottom: 8px; }
    .analysis-box.strengths h5 { color: #2e7d32; }
    .analysis-box.weaknesses h5 { color: #c62828; }
    .analysis-box.opportunities h5 { color: #1565c0; }
    .analysis-box.threats h5 { color: #e65100; }
    .analysis-box p { font-size: 0.85rem; color: #666; }
    
    /* 談判策略 */
    .talk-strategy { background: #fff9e6; padding: 15px; border-radius: 8px; border-left: 4px solid #ffa502; margin-bottom: 20px; }
    .talk-strategy h5 { color: #f57c00; margin-bottom: 8px; }
    .talk-strategy p { font-size: 0.9rem; color: #666; }
    
    /* 評分原因 */
    .reason-box { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .reason-box h5 { color: #333; margin-bottom: 8px; }
    .reason-box p { color: #666; font-size: 0.9rem; }
    
    /* 談判切入點 */
    .tips-box { background: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 4px solid #4caf50; margin-bottom: 20px; }
    .tips-box h5 { color: #2e7d32; margin-bottom: 10px; }
    .tips-box ul { margin: 0; padding-left: 20px; color: #666; font-size: 0.9rem; }
    .tips-box li { margin-bottom: 5px; }
    
    /* 參考來源 - 可展開 */
    .sources-section { border-top: 1px solid #eee; padding-top: 20px; }
    .sources-toggle { background: #f5f5f5; padding: 10px 15px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .sources-toggle:hover { background: #e0e0e0; }
    .sources-toggle h5 { color: #666; font-size: 0.9rem; }
    .sources-toggle .arrow { transition: transform 0.3s; }
    .sources-toggle.open .arrow { transform: rotate(180deg); }
    .sources-list { display: none; padding: 15px; background: #fafafa; }
    .sources-list.show { display: block; }
    .source-item { padding: 10px; background: white; border-radius: 6px; margin-bottom: 8px; }
    .source-item a { color: #667eea; text-decoration: none; font-size: 0.85rem; }
    .source-item a:hover { text-decoration: underline; }
    .source-item p { color: #999; font-size: 0.75rem; margin-top: 5px; }
    
    /* 歷史記錄 */
    .history-section { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .history-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .history-header h3 { color: #333; }
    .history-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .history-item:last-child { border-bottom: none; }
    .history-info h4 { color: #333; margin-bottom: 5px; }
    .history-info p { color: #999; font-size: 0.8rem; }
    .history-actions { display: flex; gap: 8px; }
    .history-actions button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .btn-view { background: #667eea; color: white; }
    .btn-del { background: #ff4757; color: white; }
    
    .loading { text-align: center; padding: 40px; color: #666; }
    .empty { text-align: center; padding: 40px; color: #999; }
    
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; z-index: 1000; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 潛在客戶深度分析 <span class="badge">V2</span></h1>
  </div>
  
  <div class="container">
    <!-- 搜尋框 -->
    <div class="search-box">
      <h2>🔍 深度分析對象</h2>
      <p>輸入你想深度了解的講師/公司名稱，我會全面搜尋資料並進行分析評估</p>
      <div class="search-form">
        <input type="text" id="targetInput" placeholder="例如：Peeta葛格、Joanne老師、股癌...">
        <button onclick="analyze()" id="analyzeBtn">開始分析</button>
      </div>
    </div>
    
    <!-- 分析結果 -->
    <div id="resultArea"></div>
    
    <!-- 歷史記錄 -->
    <div class="history-section">
      <div class="history-header">
        <h3>📋 歷史分析記錄</h3>
        <button onclick="loadHistory()" style="padding:8px 16px;background:#667eea;color:white;border:none;border-radius:6px;cursor:pointer;">🔄 重新整理</button>
      </div>
      <div id="historyList">
        <div class="loading">載入中...</div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    let currentResult = null;
    
    window.onload = function() {
      loadHistory();
    };
    
    async function analyze() {
      const target = document.getElementById('targetInput').value.trim();
      if (!target) {
        showToast('請輸入分析對象名稱');
        return;
      }
      
      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = '分析中...';
      
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ target })
        });
        const data = await res.json();
        
        if (data.error) {
          showToast('❌ ' + data.error);
        } else {
          showToast('✅ 分析完成！');
          currentResult = data.result;
          renderResult(data.result);
          loadHistory();
        }
      } catch(e) {
        showToast('❌ 分析失敗: ' + e.message);
      }
      
      btn.disabled = false;
      btn.textContent = '開始分析';
    }
    
    function renderResult(r) {
      const area = document.getElementById('resultArea');
      
      // 聯繫方式
      const contacts = [];
      if (r.line) contacts.push(`<span class="contact-tag line">📱 LINE: ${r.line}</span>`);
      if (r.phone) contacts.push(`<span class="contact-tag phone">📞 ${r.phone}</span>`);
      if (r.email) contacts.push(`<span class="contact-tag email">✉️ ${r.email}</span>`);
      if (r.fb) contacts.push(`<span class="contact-tag fb">📘 FB</span>`);
      if (r.other_contact) contacts.push(`<span class="contact-tag other">📎 ${r.other_contact}</span>`);
      const contactHtml = contacts.length > 0 ? contacts.join('') : '<span class="contact-tag none">無聯繫方式</span>';
      
      // SWOT 分析
      const analysis = r.analysis || {};
      const swotHtml = `
        <div class="analysis-grid">
          <div class="analysis-box strengths">
            <h5>💪 優勢</h5>
            <p>${analysis.strengths || '待分析'}</p>
          </div>
          <div class="analysis-box weaknesses">
            <h5>⚠️ 劣勢</h5>
            <p>${analysis.weaknesses || '待分析'}</p>
          </div>
          <div class="analysis-box opportunities">
            <h5>🚀 機會</h5>
            <p>${analysis.opportunities || '待分析'}</p>
          </div>
          <div class="analysis-box threats">
            <h5>🔥 威脅</h5>
            <p>${analysis.threats || '待分析'}</p>
          </div>
        </div>
      `;
      
      // 參考來源
      const sourcesHtml = r.sources ? r.sources.map(s => 
        '<div class="source-item"><a href="' + s.url + '" target="_blank">' + s.title + '</a><p>' + (s.content ? s.content.substring(0, 150) + '...' : '') + '</p></div>'
      ).join('') : '';
      
      area.innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <h3>${r.niche ? '【' + r.niche + '】 ' : ''}${r.target}</h3>
            <div class="result-score">${r.score}%</div>
          </div>
          
          <div class="result-body">
            <!-- 基本資料 -->
            <div class="info-section">
              <h4>📌 基本資料</h4>
              <div class="info-grid">
                <div class="info-item">
                  <div class="info-label">對象名稱</div>
                  <div class="info-value">${r.name || r.target}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">身份類型</div>
                  <div class="info-value">${r.analysis && r.analysis.identity_summary || r.niche ? '可能為 ' + r.niche + ' 相關' : '待分析'}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">細分領域</div>
                  <div class="info-value ${!r.niche ? 'empty' : ''}">${r.niche || '待分析'}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">資料來源數</div>
                  <div class="info-value">${r.sources ? r.sources.length : 0} 個來源</div>
                </div>
              </div>
            </div>
            
            <!-- 聯繫方式 -->
            <div class="info-section">
              <h4>📱 聯繫方式</h4>
              <div class="contact-tags">${contactHtml}</div>
            </div>
            
            <!-- SWOT 分析 -->
            <div class="info-section">
              <h4>📊 SWOT 分析</h4>
              ${swotHtml}
            </div>
            
            <!-- 整體評估 -->
            <div class="reason-box">
              <h5>📝 整體評估</h5>
              <p>${r.reason || '待分析'}</p>
            </div>
            
            <!-- 談判切入點 -->
            ${r.talk_tips ? 
            '<div class="tips-box"><h5>💡 談判切入點</h5><ul>' + 
            (Array.isArray(r.talk_tips) ? r.talk_tips.filter(t => t && t.trim()).map(t => '<li>' + t + '</li>').join('') : r.talk_tips.split('\n').filter(t => t && t.trim()).map(t => '<li>' + t + '</li>').join('')) + 
            '</ul></div>' 
            : ''}
            
            <!-- 參考來源（可展開） -->
            <div class="sources-section">
              <div class="sources-toggle" onclick="toggleSources(this)">
                <h5>📚 參考來源（${r.sources ? r.sources.length : 0} 個）</h5>
                <span class="arrow">▼</span>
              </div>
              <div class="sources-list">
                ${sourcesHtml || '無'}
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function toggleSources(btn) {
      btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('show');
    }
    
    async function loadHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div class="loading">載入中...</div>';
      
      try {
        const res = await fetch('/api/leads');
        const data = await res.json();
        
        if (data.length === 0) {
          list.innerHTML = '<div class="empty">尚無分析記錄</div>';
          return;
        }
        
        list.innerHTML = data.map(item => 
          '<div class="history-item"><div class="history-info"><h4>' + (item.niche ? '【' + item.niche + '】 ' : '') + item.target + '</h4><p>成交率：' + item.score + '% | ' + new Date(item.createdAt).toLocaleString() + '</p></div><div class="history-actions"><button class="btn-view" onclick="viewResult(\'' + item.id + '\')">查看</button><button class="btn-del" onclick="deleteResult(\'' + item.id + '\')">刪除</button></div></div>'
        ).join('');
        
      } catch(e) {
        list.innerHTML = '<div class="empty">載入失敗</div>';
      }
    }
    
    function viewResult(id) {
      fetch('/api/leads')
        .then(r => r.json())
        .then(data => {
          const item = data.find(l => l.id === id);
          if (item) {
            currentResult = item;
            renderResult(item);
            window.scrollTo(0, 0);
          }
        });
    }
    
    async function deleteResult(id) {
      if (!confirm('確定要刪除嗎？')) return;
      await fetch('/api/leads/' + id, { method: 'DELETE' });
      loadHistory();
      showToast('已刪除');
    }
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
